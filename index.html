<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sales Dashboard</title>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Mount failsafe: if the bundle fails to load/run and #root is still empty
         after 8s, show a readable message instead of a black screen. -->
    <script>
        setTimeout(function () {
            var root = document.getElementById('root');
            if (root && root.children.length === 0) {
                document.body.style.backgroundColor = '#1a1a1a';
                root.innerHTML =
                    '<div style="max-width:520px;margin:80px auto;padding:32px;background:#f5f5f5;' +
                    'border-radius:8px;border:2px solid #8b2366;text-align:center;font-family:Arial,sans-serif;">' +
                    '<h1 style="color:#8b2366;margin:0 0 14px;font-size:22px;">Dashboard couldn\'t load</h1>' +
                    '<p style="color:#444;font-size:15px;line-height:1.5;margin:0 0 22px;">A required file failed ' +
                    'to load. This is almost always a network hiccup, not lost data. Reload the page. If you\'re on ' +
                    'a restricted network, try a different one or your phone\'s hotspot.</p>' +
                    '<button onclick="window.location.reload()" style="padding:12px 24px;background:#23668b;' +
                    'color:#fff;border:none;border-radius:4px;font-size:15px;font-weight:bold;cursor:pointer;">' +
                    'Reload Dashboard</button></div>';
            }
        }, 8000);
    </script>
</body>
</html>
